name: Unit tests

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_call:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Detect changed files
        id: changes
        run: |
          # workflow_call or non-PR context: run everything
          if [ -z "${{ github.base_ref }}" ]; then
            echo "run_full=true" >> $GITHUB_OUTPUT
            echo "run_servers=false" >> $GITHUB_OUTPUT
            echo "No base_ref - running full suite"
            exit 0
          fi

          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          DOCS_PATTERN='^(docs/|fern/|README\.md|CONTRIBUTING\.md|CODE_OF_CONDUCT\.md|SECURITY\.md|ATTRIBUTIONS\.md|LICENSE)'
          SERVER_PATTERN='^(resources_servers|responses_api_agents|responses_api_models)/[^/]+/'

          # Check what types of files changed
          HAS_OTHER=$(echo "$CHANGED_FILES" | grep -vE "$DOCS_PATTERN" | grep -cvE "$SERVER_PATTERN" || true)
          HAS_SERVERS=$(echo "$CHANGED_FILES" | grep -cE "$SERVER_PATTERN" || true)

          # If any file is not a doc and not a server file -> full suite
          # Otherwise, if server files changed -> test only those servers
          # Otherwise (docs only) -> skip tests
          if [ -z "$CHANGED_FILES" ] || [ "$HAS_OTHER" -gt 0 ]; then
            echo "run_full=true" >> $GITHUB_OUTPUT
            echo "run_servers=false" >> $GITHUB_OUTPUT
          elif [ "$HAS_SERVERS" -gt 0 ]; then
            echo "run_full=false" >> $GITHUB_OUTPUT
            echo "run_servers=true" >> $GITHUB_OUTPUT
          else
            echo "run_full=false" >> $GITHUB_OUTPUT
            echo "run_servers=false" >> $GITHUB_OUTPUT
            echo "Docs-only change - skipping tests"
          fi

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Setup for test
        run: |
          sudo apt-get update
          # Curl is required for setup_nvidia.sh to download uv
          # ca-certificates is there to support curl and mitigate `curl: (77) error setting certificate file: /etc/ssl/certs/ca-certificates.crt`
          sudo apt-get install -y --no-install-recommends git curl ca-certificates
          # The flow below should be used and synced with any Docker or container related flows. There is no script here to keep it 100% explicit.
          # This is how we test and this is how you should use/consume.
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv --python 3.12
          source .venv/bin/activate
          uv sync --extra dev

      - name: Test
        run: |
          source .venv/bin/activate

          # Full suite: core library tests + all server tests
          if [[ "${{ steps.changes.outputs.run_full }}" == "true" ]]; then
            echo "Running full test suite"
            ng_dev_test
            ng_test_all +fail_on_total_and_test_mismatch=true +delete_venvs_after_each_test=true

          # Server-only: test only the changed servers
          elif [[ "${{ steps.changes.outputs.run_servers }}" == "true" ]]; then
            CHANGED_SERVERS=$(git diff --name-only origin/${{ github.base_ref }} HEAD | \
              grep -E '^(resources_servers|responses_api_agents|responses_api_models)/[^/]+/' | \
              cut -d'/' -f1-2 | sort -u)

            echo "Testing changed servers:"
            echo "$CHANGED_SERVERS" | sed 's/^/  - /'

            EXIT_CODE=0
            for server in $CHANGED_SERVERS; do
              echo ""
              echo "================================================"
              echo "Testing: $server"
              echo "================================================"
              if ng_test +entrypoint=$server +delete_venvs_after_each_test=true; then
                echo "PASS: $server"
              else
                echo "FAIL: $server"
                EXIT_CODE=1
              fi
            done

            if [ $EXIT_CODE -ne 0 ]; then
              echo "Some server tests failed"
              exit 1
            fi

          # Docs-only: nothing to test
          else
            echo "No tests to run"
          fi
