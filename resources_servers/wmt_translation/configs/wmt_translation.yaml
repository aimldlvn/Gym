wmt_translation:
  resources_servers:
    wmt_translation:
      entrypoint: app.py
      domain: other
      verified: false
      description: Machine-translation verifier computing corpus-level BLEU per language pair plus optional xCOMET-XXL neural QE via a Ray GPU actor.
      value: Improves multilingual translation quality across BLEU and COMET-family metrics.
      compute_comet: true
      comet_model: Unbabel/XCOMET-XXL
      comet_batch_size: 16
      # num_gpus=0: share a GPU with vLLM's DP engines rather than claim a
      # dedicated one (Ray would queue forever because vLLM reserves all GPUs
      # in its placement group). See app.py for the co-tenant rationale.
      comet_num_gpus: 0

wmt_translation_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: wmt_translation
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/wmt_translation/data/example.jsonl
        num_repeats: 1
        license: Creative Commons Attribution Share Alike 4.0
